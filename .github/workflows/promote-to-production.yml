# One-click release: merge develop → main, apply prod migrations, deploy edge functions.
# Triggered from Admin → Test & deploy → "Release to production" (edge function) or manually in GitHub Actions.

name: Promote to production

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-to-production
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge develop into main and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin develop main
          git checkout main
          git pull origin main
          git merge origin/develop --no-edit -m "chore: promote develop to production [automated]"
          git push origin main

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          # Pin version — "latest" can fail with GitHub API gateway timeouts in CI
          version: 2.105.0

      - name: Apply database migrations (production)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
        run: bash scripts/supabase-prod-db-push.sh

      - name: Deploy edge functions (production)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN not set — skip function deploy."
            exit 0
          fi
          supabase link --project-ref "${{ secrets.SUPABASE_PROD_PROJECT_REF }}"
          supabase functions deploy admin-create-user
          supabase functions deploy admin-delete-user
          supabase functions deploy admin-reset-password
          supabase functions deploy admin-promote-production

      - name: Trigger Netlify production build (optional)
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_PRODUCTION_BUILD_HOOK }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK" ]; then
            echo "NETLIFY_PRODUCTION_BUILD_HOOK not set — Netlify may still build from GitHub push."
            exit 0
          fi
          curl -fsS -X POST "$NETLIFY_BUILD_HOOK"
