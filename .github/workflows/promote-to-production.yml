# One-click release: merge develop → main, migrate prod DB, deploy functions + Netlify site.
# Triggered from Admin → Test & deploy → "Release to production" or manually in GitHub Actions.

name: Promote to production

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-to-production
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_PRODUCTION_BUILD_HOOK }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve production deploy mode
        id: deploy
        run: |
          if [ -n "$NETLIFY_BUILD_HOOK" ]; then
            echo "mode=hook" >> "$GITHUB_OUTPUT"
            echo "skip_netlify=true" >> "$GITHUB_OUTPUT"
            echo "Deploy mode: Netlify build hook (after merge + DB + functions)."
            exit 0
          fi
          if [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ] && [ -n "$VITE_SUPABASE_URL" ] && [ -n "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "mode=cli" >> "$GITHUB_OUTPUT"
            echo "skip_netlify=true" >> "$GITHUB_OUTPUT"
            echo "Deploy mode: CI build + Netlify CLI (after merge + DB + functions)."
            exit 0
          fi
          echo "mode=github" >> "$GITHUB_OUTPUT"
          echo "skip_netlify=false" >> "$GITHUB_OUTPUT"
          echo "Deploy mode: Netlify GitHub integration (auto-build on main push)."
          echo "::notice::Optional: add GitHub secret NETLIFY_PRODUCTION_BUILD_HOOK for deploy after DB migrations instead of on push."

      - name: Merge develop into main and push
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin develop main
          echo "develop=$(git rev-parse origin/develop)" >> "$GITHUB_OUTPUT"
          echo "main_before=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"
          git checkout main
          git pull origin main
          MERGE_MSG="chore: promote develop to production [automated]"
          if [ "${{ steps.deploy.outputs.skip_netlify }}" = "true" ]; then
            MERGE_MSG="$MERGE_MSG [skip netlify]"
          fi
          git merge origin/develop --no-edit -m "$MERGE_MSG"
          git push origin main
          git fetch origin main
          git reset --hard origin/main
          echo "main_after=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "Merged main is now at $(git rev-parse --short HEAD)"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.105.0

      - name: Apply database migrations (production)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: bash scripts/supabase-prod-db-push.sh

      - name: Deploy edge functions (production)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN not set — skip function deploy."
            exit 0
          fi
          link_args=(--project-ref "${{ secrets.SUPABASE_PROD_PROJECT_REF }}")
          if [ -n "${SUPABASE_DB_PASSWORD:-}" ]; then
            link_args+=(--password "$SUPABASE_DB_PASSWORD")
          fi
          supabase link "${link_args[@]}"
          supabase functions deploy admin-create-user
          supabase functions deploy admin-delete-user
          supabase functions deploy admin-reset-password
          supabase functions deploy admin-promote-production

      - name: Deploy production site to Netlify
        run: |
          DEPLOY_MSG="Promote develop (${{ steps.merge.outputs.develop }}) → main (${{ steps.merge.outputs.main_after }})"
          MODE="${{ steps.deploy.outputs.mode }}"

          if [ "$MODE" = "cli" ]; then
            echo "Building frontend in CI and deploying dist/ via Netlify CLI..."
            npm ci
            VITE_APP_ENV=production npm run build
            npx --yes netlify-cli@23.1.4 deploy --prod --dir=dist --message="$DEPLOY_MSG"
            echo "Netlify production deploy complete (CI build)."
            exit 0
          fi

          if [ "$MODE" = "hook" ]; then
            echo "Triggering Netlify production build hook..."
            curl -fsS -X POST -d "{}" "$NETLIFY_BUILD_HOOK"
            echo "Netlify build hook triggered for main commit ${{ steps.merge.outputs.main_after }}."
            exit 0
          fi

          echo "No Netlify hook/CLI secrets — production site should rebuild from the main push via Netlify GitHub integration."
          echo "Check Netlify → Deploys for a new production build on commit ${{ steps.merge.outputs.main_after }}."
